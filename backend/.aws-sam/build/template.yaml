AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: HealthSathi Backend - AWS AI for Bharat Hackathon
Parameters:
  Environment:
    Type: String
    Default: prod
    AllowedValues:
    - dev
    - staging
    - prod
  AlertEmail:
    Type: String
    Description: Email for CloudWatch alarm notifications
  BedrockRegion:
    Type: String
    Default: us-east-1
    Description: AWS region where Bedrock models are available
Globals:
  Function:
    Timeout: 30
    Runtime: nodejs18.x
    MemorySize: 512
    Tracing: Active
    Layers:
    - Ref: SharedLayer
    Environment:
      Variables:
        TABLE_NAME:
          Ref: HealthSathiTable
        UPLOAD_BUCKET:
          Ref: UploadBucket
        MODELS_BUCKET:
          Ref: ModelsBucket
        CONTENT_BUCKET:
          Ref: ContentBucket
        DOCTOR_ALERTS_TOPIC:
          Ref: DoctorAlerts
        ENVIRONMENT:
          Ref: Environment
        BEDROCK_REGION:
          Ref: BedrockRegion
        BEDROCK_MODEL_ID: anthropic.claude-3-5-sonnet-20241022-v2:0
        BEDROCK_FAST_MODEL_ID: amazon.nova-lite-v1:0
        CONVERSATIONS_BUCKET:
          Ref: ConversationsBucket
        TIMESTREAM_DB: ''
        TIMESTREAM_TABLE: ''
        POWERTOOLS_SERVICE_NAME: healthsathi
        LOG_LEVEL: INFO
  Api:
    TracingEnabled: true
    Cors:
      AllowOrigin: '''*'''
      AllowMethods: '''GET,POST,PUT,DELETE,OPTIONS'''
      AllowHeaders: '''Content-Type,Authorization,X-Api-Key'''
Resources:
  SharedLayer:
    Type: AWS::Serverless::LayerVersion
    Properties:
      LayerName:
        Fn::Sub: healthsathi-shared-${Environment}
      Description: Shared DynamoDB, response, and metrics utilities
      ContentUri: ..\..\layers\shared
      CompatibleRuntimes:
      - nodejs18.x
      RetentionPolicy: Delete
  HealthSathiApi:
    Type: AWS::Serverless::Api
    Properties:
      StageName:
        Ref: Environment
      Auth:
        ApiKeyRequired: true
        UsagePlan:
          CreateUsagePlan: PER_API
          Quota:
            Limit: 10000
            Period: DAY
          Throttle:
            BurstLimit: 100
            RateLimit: 50
      AccessLogSetting:
        DestinationArn:
          Fn::GetAtt:
          - ApiAccessLogGroup
          - Arn
      MethodSettings:
      - ResourcePath: /*
        HttpMethod: '*'
        MetricsEnabled: true
        DataTraceEnabled: false
        LoggingLevel: ERROR
  BedrockPolicy:
    Type: AWS::IAM::ManagedPolicy
    Properties:
      ManagedPolicyName:
        Fn::Sub: healthsathi-bedrock-${Environment}
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
        - Effect: Allow
          Action:
          - bedrock:InvokeModel
          - bedrock:InvokeModelWithResponseStream
          Resource:
          - Fn::Sub: arn:aws:bedrock:${BedrockRegion}::foundation-model/anthropic.claude-3-5-sonnet-20241022-v2:0
          - Fn::Sub: arn:aws:bedrock:${BedrockRegion}::foundation-model/anthropic.claude-3-haiku-20240307-v1:0
          - Fn::Sub: arn:aws:bedrock:${BedrockRegion}::foundation-model/amazon.nova-lite-v1:0
          - Fn::Sub: arn:aws:bedrock:${BedrockRegion}::foundation-model/amazon.titan-embed-text-v1
  RekognitionPolicy:
    Type: AWS::IAM::ManagedPolicy
    Properties:
      ManagedPolicyName:
        Fn::Sub: healthsathi-rekognition-${Environment}
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
        - Effect: Allow
          Action:
          - rekognition:DetectLabels
          - rekognition:DetectText
          - rekognition:DetectModerationLabels
          Resource: '*'
  TextractPolicy:
    Type: AWS::IAM::ManagedPolicy
    Properties:
      ManagedPolicyName:
        Fn::Sub: healthsathi-textract-${Environment}
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
        - Effect: Allow
          Action:
          - textract:AnalyzeDocument
          - textract:DetectDocumentText
          - textract:AnalyzeExpense
          Resource: '*'
  TranslatePolicy:
    Type: AWS::IAM::ManagedPolicy
    Properties:
      ManagedPolicyName:
        Fn::Sub: healthsathi-translate-${Environment}
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
        - Effect: Allow
          Action:
          - translate:TranslateText
          - translate:ListLanguages
          - comprehend:DetectDominantLanguage
          Resource: '*'
  PollyPolicy:
    Type: AWS::IAM::ManagedPolicy
    Properties:
      ManagedPolicyName:
        Fn::Sub: healthsathi-polly-${Environment}
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
        - Effect: Allow
          Action:
          - polly:SynthesizeSpeech
          - polly:DescribeVoices
          Resource: '*'
  TranscribePolicy:
    Type: AWS::IAM::ManagedPolicy
    Properties:
      ManagedPolicyName:
        Fn::Sub: healthsathi-transcribe-${Environment}
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
        - Effect: Allow
          Action:
          - transcribe:StartTranscriptionJob
          - transcribe:GetTranscriptionJob
          - transcribe:StartMedicalTranscriptionJob
          - transcribe:GetMedicalTranscriptionJob
          Resource: '*'
  SyncFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName:
        Fn::Sub: healthsathi-sync-${Environment}
      CodeUri: SyncFunction
      Handler: index.handler
      Description: Handle offline queue sync from mobile apps
      Events:
        SyncAPI:
          Type: Api
          Properties:
            RestApiId:
              Ref: HealthSathiApi
            Path: /api/sync
            Method: post
      Policies:
      - DynamoDBCrudPolicy:
          TableName:
            Ref: HealthSathiTable
      - CloudWatchPutMetricPolicy: {}
    Metadata:
      SamResourceId: SyncFunction
  OutbreakDetectionFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName:
        Fn::Sub: healthsathi-outbreak-${Environment}
      CodeUri: OutbreakDetectionFunction
      Handler: index.handler
      Description: Detect disease clusters via DBSCAN geographic analysis
      Timeout: 60
      MemorySize: 1024
      Events:
        DetectAPI:
          Type: Api
          Properties:
            RestApiId:
              Ref: HealthSathiApi
            Path: /api/outbreak-detect
            Method: post
      Policies:
      - DynamoDBReadPolicy:
          TableName:
            Ref: HealthSathiTable
      - SNSPublishMessagePolicy:
          TopicName:
            Fn::GetAtt:
            - DoctorAlerts
            - TopicName
      - CloudWatchPutMetricPolicy: {}
    Metadata:
      SamResourceId: OutbreakDetectionFunction
  MedicineScannerFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName:
        Fn::Sub: healthsathi-medicine-scanner-${Environment}
      CodeUri: MedicineScannerFunction
      Handler: index.handler
      Description: Classify medicine image via Rekognition + explain via Bedrock
      Timeout: 45
      Events:
        ScanAPI:
          Type: Api
          Properties:
            RestApiId:
              Ref: HealthSathiApi
            Path: /api/scan-medicine
            Method: post
      Policies:
      - Ref: BedrockPolicy
      - Ref: RekognitionPolicy
      - Ref: TranslatePolicy
      - DynamoDBCrudPolicy:
          TableName:
            Ref: HealthSathiTable
      - S3CrudPolicy:
          BucketName:
            Ref: UploadBucket
      - CloudWatchPutMetricPolicy: {}
    Metadata:
      SamResourceId: MedicineScannerFunction
  CounterfeitFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName:
        Fn::Sub: healthsathi-counterfeit-${Environment}
      CodeUri: CounterfeitFunction
      Handler: index.handler
      Description: Verify medicine authenticity via Rekognition + Bedrock Claude
      Timeout: 45
      Events:
        CounterfeitAPI:
          Type: Api
          Properties:
            RestApiId:
              Ref: HealthSathiApi
            Path: /api/verify-medicine
            Method: post
      Policies:
      - Ref: BedrockPolicy
      - Ref: RekognitionPolicy
      - DynamoDBCrudPolicy:
          TableName:
            Ref: HealthSathiTable
      - S3ReadPolicy:
          BucketName:
            Ref: UploadBucket
      - CloudWatchPutMetricPolicy: {}
    Metadata:
      SamResourceId: CounterfeitFunction
  PrescriptionReaderFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName:
        Fn::Sub: healthsathi-prescription-reader-${Environment}
      CodeUri: PrescriptionReaderFunction
      Handler: index.handler
      Description: OCR prescriptions with Textract + parse with Bedrock Claude
      Timeout: 60
      Events:
        PrescriptionAPI:
          Type: Api
          Properties:
            RestApiId:
              Ref: HealthSathiApi
            Path: /api/read-prescription
            Method: post
      Policies:
      - Ref: BedrockPolicy
      - Ref: TextractPolicy
      - Ref: TranslatePolicy
      - S3CrudPolicy:
          BucketName:
            Ref: UploadBucket
      - DynamoDBCrudPolicy:
          TableName:
            Ref: HealthSathiTable
      - CloudWatchPutMetricPolicy: {}
    Metadata:
      SamResourceId: PrescriptionReaderFunction
  LabReportFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName:
        Fn::Sub: healthsathi-lab-report-${Environment}
      CodeUri: LabReportFunction
      Handler: index.handler
      Description: Extract lab report via Textract + explain via Bedrock Claude
      Timeout: 60
      Events:
        LabReportAPI:
          Type: Api
          Properties:
            RestApiId:
              Ref: HealthSathiApi
            Path: /api/explain-report
            Method: post
      Policies:
      - Ref: BedrockPolicy
      - Ref: TextractPolicy
      - Ref: TranslatePolicy
      - S3CrudPolicy:
          BucketName:
            Ref: UploadBucket
      - DynamoDBCrudPolicy:
          TableName:
            Ref: HealthSathiTable
      - CloudWatchPutMetricPolicy: {}
    Metadata:
      SamResourceId: LabReportFunction
  InteractionCheckerFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName:
        Fn::Sub: healthsathi-interaction-checker-${Environment}
      CodeUri: InteractionCheckerFunction
      Handler: index.handler
      Description: Drug interaction checking via Bedrock Claude + DynamoDB cache
      Timeout: 45
      Events:
        InteractionAPI:
          Type: Api
          Properties:
            RestApiId:
              Ref: HealthSathiApi
            Path: /api/check-interactions
            Method: post
      Policies:
      - Ref: BedrockPolicy
      - DynamoDBCrudPolicy:
          TableName:
            Ref: HealthSathiTable
      - CloudWatchPutMetricPolicy: {}
    Metadata:
      SamResourceId: InteractionCheckerFunction
  TranslateFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName:
        Fn::Sub: healthsathi-translate-${Environment}
      CodeUri: TranslateFunction
      Handler: index.handler
      Description: Multi-language translation via AWS Translate + TTS via Polly
      Timeout: 30
      Events:
        TranslateAPI:
          Type: Api
          Properties:
            RestApiId:
              Ref: HealthSathiApi
            Path: /api/translate
            Method: post
        SpeechAPI:
          Type: Api
          Properties:
            RestApiId:
              Ref: HealthSathiApi
            Path: /api/speak
            Method: post
      Policies:
      - Ref: TranslatePolicy
      - Ref: PollyPolicy
      - S3CrudPolicy:
          BucketName:
            Ref: ContentBucket
      - CloudWatchPutMetricPolicy: {}
    Metadata:
      SamResourceId: TranslateFunction
  DashboardFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName:
        Fn::Sub: healthsathi-dashboard-${Environment}
      CodeUri: DashboardFunction
      Handler: index.handler
      Description: Aggregate doctor dashboard data
      Events:
        DashboardAPI:
          Type: Api
          Properties:
            RestApiId:
              Ref: HealthSathiApi
            Path: /api/dashboard/{doctorId}
            Method: get
      Policies:
      - DynamoDBReadPolicy:
          TableName:
            Ref: HealthSathiTable
      - CloudWatchPutMetricPolicy: {}
    Metadata:
      SamResourceId: DashboardFunction
  HealthLibraryFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName:
        Fn::Sub: healthsathi-health-library-${Environment}
      CodeUri: HealthLibraryFunction
      Handler: index.handler
      Description: RAG-powered medical Q&A via Amazon Nova Lite + conversation history
        in S3
      Timeout: 30
      Events:
        AskAPI:
          Type: Api
          Properties:
            RestApiId:
              Ref: HealthSathiApi
            Path: /api/health-library/ask
            Method: post
        HistoryAPI:
          Type: Api
          Properties:
            RestApiId:
              Ref: HealthSathiApi
            Path: /api/health-library/history
            Method: get
      Policies:
      - Ref: BedrockPolicy
      - Ref: TranslatePolicy
      - S3CrudPolicy:
          BucketName:
            Ref: ConversationsBucket
      - CloudWatchPutMetricPolicy: {}
    Metadata:
      SamResourceId: HealthLibraryFunction
  PresignFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName:
        Fn::Sub: healthsathi-presign-${Environment}
      CodeUri: PresignFunction
      Handler: index.handler
      Description: Generate S3 pre-signed PUT URLs for client-side uploads
      Timeout: 10
      Events:
        PresignAPI:
          Type: Api
          Properties:
            RestApiId:
              Ref: HealthSathiApi
            Path: /api/presign
            Method: get
      Policies:
      - S3CrudPolicy:
          BucketName:
            Ref: UploadBucket
      - CloudWatchPutMetricPolicy: {}
    Metadata:
      SamResourceId: PresignFunction
  SmsGatewayFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName:
        Fn::Sub: healthsathi-sms-${Environment}
      CodeUri: SmsGatewayFunction
      Handler: index.handler
      Description: Handle SMS commands for feature phones
      Events:
        SmsAPI:
          Type: Api
          Properties:
            RestApiId:
              Ref: HealthSathiApi
            Path: /api/sms
            Method: post
      Policies:
      - SNSPublishMessagePolicy:
          TopicName:
            Fn::GetAtt:
            - DoctorAlerts
            - TopicName
      - Statement:
        - Effect: Allow
          Action: sns:Publish
          Resource: '*'
    Metadata:
      SamResourceId: SmsGatewayFunction
  HealthSathiTable:
    Type: AWS::DynamoDB::Table
    DeletionPolicy: Retain
    Properties:
      TableName:
        Fn::Sub: healthsathi-data-${Environment}
      BillingMode: PAY_PER_REQUEST
      SSESpecification:
        SSEEnabled: true
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true
      AttributeDefinitions:
      - AttributeName: PK
        AttributeType: S
      - AttributeName: SK
        AttributeType: S
      - AttributeName: GSI1PK
        AttributeType: S
      - AttributeName: GSI1SK
        AttributeType: S
      - AttributeName: GSI2PK
        AttributeType: S
      - AttributeName: GSI2SK
        AttributeType: S
      KeySchema:
      - AttributeName: PK
        KeyType: HASH
      - AttributeName: SK
        KeyType: RANGE
      GlobalSecondaryIndexes:
      - IndexName: GSI1
        KeySchema:
        - AttributeName: GSI1PK
          KeyType: HASH
        - AttributeName: GSI1SK
          KeyType: RANGE
        Projection:
          ProjectionType: ALL
      - IndexName: GSI2
        KeySchema:
        - AttributeName: GSI2PK
          KeyType: HASH
        - AttributeName: GSI2SK
          KeyType: RANGE
        Projection:
          ProjectionType: ALL
      StreamSpecification:
        StreamViewType: NEW_AND_OLD_IMAGES
      TimeToLiveSpecification:
        AttributeName: ttl
        Enabled: true
  UploadBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName:
        Fn::Sub: healthsathi-uploads-${AWS::AccountId}-${Environment}
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      LifecycleConfiguration:
        Rules:
        - Id: DeleteUploads
          Status: Enabled
          ExpirationInDays: 7
      CorsConfiguration:
        CorsRules:
        - AllowedOrigins:
          - '*'
          AllowedMethods:
          - PUT
          - POST
          - GET
          AllowedHeaders:
          - '*'
          MaxAge: 3600
  ModelsBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName:
        Fn::Sub: healthsathi-ml-models-${AWS::AccountId}
      VersioningConfiguration:
        Status: Enabled
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
  ConversationsBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName:
        Fn::Sub: healthsathi-conversations-${AWS::AccountId}-${Environment}
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      LifecycleConfiguration:
        Rules:
        - Id: DeleteOldConversations
          Status: Enabled
          ExpirationInDays: 90
  WebsiteBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName:
        Fn::Sub: healthsathi-frontend-${AWS::AccountId}-${Environment}
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
  WebsiteBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket:
        Ref: WebsiteBucket
      PolicyDocument:
        Statement:
        - Effect: Allow
          Principal:
            Service: cloudfront.amazonaws.com
          Action: s3:GetObject
          Resource:
            Fn::Sub: ${WebsiteBucket.Arn}/*
          Condition:
            StringEquals:
              AWS:SourceArn:
                Fn::Sub: arn:aws:cloudfront::${AWS::AccountId}:distribution/${CloudFrontDistribution}
  CloudFrontOAC:
    Type: AWS::CloudFront::OriginAccessControl
    Properties:
      OriginAccessControlConfig:
        Name:
          Fn::Sub: healthsathi-oac-${Environment}
        OriginAccessControlOriginType: s3
        SigningBehavior: always
        SigningProtocol: sigv4
  CloudFrontDistribution:
    Type: AWS::CloudFront::Distribution
    Properties:
      DistributionConfig:
        Comment:
          Fn::Sub: HealthSathi PWA - ${Environment}
        Enabled: true
        DefaultRootObject: index.html
        PriceClass: PriceClass_200
        HttpVersion: http2
        Origins:
        - Id: S3Origin
          DomainName:
            Fn::GetAtt:
            - WebsiteBucket
            - RegionalDomainName
          OriginAccessControlId:
            Fn::GetAtt:
            - CloudFrontOAC
            - Id
          S3OriginConfig:
            OriginAccessIdentity: ''
        DefaultCacheBehavior:
          TargetOriginId: S3Origin
          ViewerProtocolPolicy: redirect-to-https
          CachePolicyId: 658327ea-f89d-4fab-a63d-7e88639e58f6
          OriginRequestPolicyId: 88a5eaf4-2fd4-4709-b370-b4c650ea3fcf
          Compress: true
        CustomErrorResponses:
        - ErrorCode: 403
          ResponseCode: 200
          ResponsePagePath: /index.html
          ErrorCachingMinTTL: 0
        - ErrorCode: 404
          ResponseCode: 200
          ResponsePagePath: /index.html
          ErrorCachingMinTTL: 0
  ContentBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName:
        Fn::Sub: healthsathi-content-${AWS::AccountId}
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      LifecycleConfiguration:
        Rules:
        - Id: DeleteOldAudio
          Status: Enabled
          ExpirationInDays: 30
          Prefix: audio/
  DoctorAlerts:
    Type: AWS::SNS::Topic
    Properties:
      TopicName:
        Fn::Sub: healthsathi-doctor-alerts-${Environment}
      KmsMasterKeyId: alias/aws/sns
      Subscription:
      - Protocol: email
        Endpoint:
          Ref: AlertEmail
  ApiAccessLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName:
        Fn::Sub: /aws/apigateway/healthsathi-${Environment}
      RetentionInDays: 14
  SyncLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName:
        Fn::Sub: /aws/lambda/healthsathi-sync-${Environment}
      RetentionInDays: 14
  MedicineScannerLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName:
        Fn::Sub: /aws/lambda/healthsathi-medicine-scanner-${Environment}
      RetentionInDays: 14
  CounterfeitLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName:
        Fn::Sub: /aws/lambda/healthsathi-counterfeit-${Environment}
      RetentionInDays: 14
  PrescriptionLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName:
        Fn::Sub: /aws/lambda/healthsathi-prescription-reader-${Environment}
      RetentionInDays: 14
  LabReportLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName:
        Fn::Sub: /aws/lambda/healthsathi-lab-report-${Environment}
      RetentionInDays: 14
  InteractionLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName:
        Fn::Sub: /aws/lambda/healthsathi-interaction-checker-${Environment}
      RetentionInDays: 14
  TranslateLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName:
        Fn::Sub: /aws/lambda/healthsathi-translate-${Environment}
      RetentionInDays: 14
  HealthLibraryLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName:
        Fn::Sub: /aws/lambda/healthsathi-health-library-${Environment}
      RetentionInDays: 14
  PresignLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName:
        Fn::Sub: /aws/lambda/healthsathi-presign-${Environment}
      RetentionInDays: 7
  SyncErrorAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName:
        Fn::Sub: healthsathi-sync-errors-${Environment}
      MetricName: Errors
      Namespace: AWS/Lambda
      Dimensions:
      - Name: FunctionName
        Value:
          Ref: SyncFunction
      Statistic: Sum
      Period: 300
      EvaluationPeriods: 2
      Threshold: 5
      ComparisonOperator: GreaterThanThreshold
      AlarmActions:
      - Ref: DoctorAlerts
      TreatMissingData: notBreaching
  ApiLatencyAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName:
        Fn::Sub: healthsathi-api-latency-${Environment}
      MetricName: Latency
      Namespace: AWS/ApiGateway
      Dimensions:
      - Name: ApiName
        Value:
          Ref: HealthSathiApi
      ExtendedStatistic: p99
      Period: 300
      EvaluationPeriods: 3
      Threshold: 5000
      ComparisonOperator: GreaterThanThreshold
      AlarmActions:
      - Ref: DoctorAlerts
  BedrockErrorAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName:
        Fn::Sub: healthsathi-bedrock-errors-${Environment}
      MetricName: BedrockCallError
      Namespace: HealthSathi
      Statistic: Sum
      Period: 300
      EvaluationPeriods: 1
      Threshold: 3
      ComparisonOperator: GreaterThanThreshold
      AlarmActions:
      - Ref: DoctorAlerts
      TreatMissingData: notBreaching
  HealthSathiDashboard:
    Type: AWS::CloudWatch::Dashboard
    Properties:
      DashboardName:
        Fn::Sub: HealthSathi-${Environment}
      DashboardBody:
        Fn::Sub: "{\n  \"widgets\": [\n    {\n      \"type\": \"metric\", \"x\": 0,\
          \ \"y\": 0, \"width\": 12, \"height\": 6,\n      \"properties\": {\n   \
          \     \"title\": \"Lambda Invocations\",\n        \"region\": \"${AWS::Region}\"\
          ,\n        \"metrics\": [\n          [\"AWS/Lambda\",\"Invocations\",\"\
          FunctionName\",\"healthsathi-medicine-scanner-${Environment}\"],\n     \
          \     [\"AWS/Lambda\",\"Invocations\",\"FunctionName\",\"healthsathi-counterfeit-${Environment}\"\
          ],\n          [\"AWS/Lambda\",\"Invocations\",\"FunctionName\",\"healthsathi-lab-report-${Environment}\"\
          ],\n          [\"AWS/Lambda\",\"Invocations\",\"FunctionName\",\"healthsathi-prescription-reader-${Environment}\"\
          ],\n          [\"AWS/Lambda\",\"Invocations\",\"FunctionName\",\"healthsathi-interaction-checker-${Environment}\"\
          ],\n          [\"AWS/Lambda\",\"Invocations\",\"FunctionName\",\"healthsathi-translate-${Environment}\"\
          ]\n        ],\n        \"period\": 300, \"stat\": \"Sum\", \"view\": \"\
          timeSeries\"\n      }\n    },\n    {\n      \"type\": \"metric\", \"x\"\
          : 12, \"y\": 0, \"width\": 12, \"height\": 6,\n      \"properties\": {\n\
          \        \"title\": \"AWS AI Service Calls\",\n        \"region\": \"${AWS::Region}\"\
          ,\n        \"metrics\": [\n          [\"HealthSathi\",\"BedrockCallSuccess\"\
          ,{\"stat\":\"Sum\",\"label\":\"Bedrock\"}],\n          [\"HealthSathi\"\
          ,\"RekognitionCallSuccess\",{\"stat\":\"Sum\",\"label\":\"Rekognition\"\
          }],\n          [\"HealthSathi\",\"TextractCallSuccess\",{\"stat\":\"Sum\"\
          ,\"label\":\"Textract\"}],\n          [\"HealthSathi\",\"TranslateCallSuccess\"\
          ,{\"stat\":\"Sum\",\"label\":\"Translate\"}]\n        ],\n        \"period\"\
          : 300, \"stat\": \"Sum\", \"view\": \"timeSeries\"\n      }\n    },\n  \
          \  {\n      \"type\": \"metric\", \"x\": 0, \"y\": 6, \"width\": 12, \"\
          height\": 6,\n      \"properties\": {\n        \"title\": \"API Gateway\"\
          ,\n        \"region\": \"${AWS::Region}\",\n        \"metrics\": [\n   \
          \       [\"AWS/ApiGateway\",\"Count\",\"ApiName\",\"HealthSathiApi\"],\n\
          \          [\"AWS/ApiGateway\",\"4XXError\",\"ApiName\",\"HealthSathiApi\"\
          ],\n          [\"AWS/ApiGateway\",\"5XXError\",\"ApiName\",\"HealthSathiApi\"\
          ]\n        ],\n        \"period\": 300, \"stat\": \"Sum\", \"view\": \"\
          timeSeries\"\n      }\n    },\n    {\n      \"type\": \"metric\", \"x\"\
          : 12, \"y\": 6, \"width\": 12, \"height\": 6,\n      \"properties\": {\n\
          \        \"title\": \"DynamoDB Latency\",\n        \"region\": \"${AWS::Region}\"\
          ,\n        \"metrics\": [\n          [\"AWS/DynamoDB\",\"SuccessfulRequestLatency\"\
          ,\"TableName\",\"healthsathi-data-${Environment}\",\"Operation\",\"GetItem\"\
          ],\n          [\"AWS/DynamoDB\",\"SuccessfulRequestLatency\",\"TableName\"\
          ,\"healthsathi-data-${Environment}\",\"Operation\",\"PutItem\"]\n      \
          \  ],\n        \"period\": 300, \"stat\": \"Average\", \"view\": \"timeSeries\"\
          \n      }\n    }\n  ]\n}\n"
Outputs:
  ApiEndpoint:
    Description: API Gateway endpoint URL
    Value:
      Fn::Sub: https://${HealthSathiApi}.execute-api.${AWS::Region}.amazonaws.com/${Environment}
    Export:
      Name:
        Fn::Sub: healthsathi-api-endpoint-${Environment}
  TableName:
    Description: DynamoDB table name
    Value:
      Ref: HealthSathiTable
  UploadBucketName:
    Description: S3 bucket for Textract/Rekognition uploads
    Value:
      Ref: UploadBucket
  ModelsBucketName:
    Description: S3 bucket for ML models
    Value:
      Ref: ModelsBucket
  DoctorAlertsTopicArn:
    Description: SNS topic ARN for doctor alerts
    Value:
      Ref: DoctorAlerts
  CloudFrontURL:
    Description: CloudFront distribution URL for the HealthSathi PWA
    Value:
      Fn::Sub: https://${CloudFrontDistribution.DomainName}
    Export:
      Name:
        Fn::Sub: healthsathi-frontend-url-${Environment}
  WebsiteBucketName:
    Description: S3 bucket for PWA static assets (deploy via CloudFront)
    Value:
      Ref: WebsiteBucket
  ConversationsBucketName:
    Description: S3 bucket for AI conversation history
    Value:
      Ref: ConversationsBucket
