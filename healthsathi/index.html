<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <!-- ── Icons ── -->
    <link rel="icon" type="image/svg+xml" href="/icon.svg" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />

    <!-- ── Viewport & PWA ── -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#1e3a5f" />

    <!-- ── SEO / Open Graph ── -->
    <meta name="description" content="AI-powered offline healthcare platform for rural communities. Scan medicines, check symptoms, read lab reports — in your language." />
    <meta name="keywords" content="healthcare, rural, AI, medicine scanner, symptom checker, offline, Hindi, Marathi" />
    <meta property="og:title" content="HealthSathi - Offline Healthcare" />
    <meta property="og:description" content="AI-powered healthcare for rural India. Works offline." />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="/icon-512.png" />

    <!-- ── iOS/Android PWA ── -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="HealthSathi" />
    <!-- Prevent phone number detection on health content -->
    <meta name="format-detection" content="telephone=no" />

    <!-- PWA manifest -->
    <link rel="manifest" href="/manifest.json" />

    <title>HealthSathi - Offline Healthcare</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      // Register service worker for PWA / installable app
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', function() {
          navigator.serviceWorker.register('/sw.js').catch(function() {});
        });
      }
    </script>
  </body>
</html>
